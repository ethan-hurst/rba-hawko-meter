name: Daily ASX Futures Scraper

on:
  schedule:
    - cron: '23 6 * * 1-5'    # Weekdays 6:23 AM UTC (after AU market close)
  workflow_dispatch:            # Manual trigger support

permissions:
  contents: write

concurrency:
  group: daily-asx-futures
  cancel-in-progress: false

jobs:
  scrape-futures:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape ASX futures
        run: python -m pipeline.ingest.asx_futures_scraper

      - name: Regenerate status.json
        run: python -m pipeline.normalize.engine

      - name: Verify ASX data freshness
        continue-on-error: true
        run: |
          python3 -c "
          import pandas as pd
          from datetime import datetime, timedelta
          df = pd.read_csv('data/asx_futures.csv')
          df['date'] = pd.to_datetime(df['date'])
          latest = df['date'].max()
          threshold = datetime.now() - timedelta(days=7)
          if latest < threshold:
              print(f'WARNING: Latest ASX data is {latest.date()}, older than 7 days')
              exit(1)
          print(f'OK: Latest ASX data is {latest.date()}')
          "

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'data: daily ASX futures update [skip ci]'
          file_pattern: 'data/*.csv public/data/status.json'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
