name: Weekly Data Pipeline

on:
  schedule:
    - cron: '7 2 * * 1'       # Monday 2:07 AM UTC (off-peak, avoids :00)
  workflow_dispatch:            # Manual trigger support

permissions:
  contents: write              # Required for git-auto-commit-action

concurrency:
  group: data-pipeline
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data pipeline
        run: python -m pipeline.main

      - name: Generate pipeline status summary
        if: always()
        run: |
          echo "## Weekly Pipeline Status" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import json
          try:
              with open('public/data/status.json') as f:
                  status = json.load(f)
              score = status['overall']['hawk_score']
              available = status['metadata']['indicators_available']
              missing = status['metadata']['indicators_missing']
              print(f'Hawk Score: **{score:.1f}** ({status[\"overall\"][\"zone_label\"]})', file=open('$GITHUB_STEP_SUMMARY', 'a'))
              print(f'Indicators: {available}/8 available', file=open('$GITHUB_STEP_SUMMARY', 'a'))
              if missing:
                  print(f'Missing: {', '.join(missing)}', file=open('$GITHUB_STEP_SUMMARY', 'a'))
          except Exception as e:
              print(f'Error reading status.json: {e}', file=open('$GITHUB_STEP_SUMMARY', 'a'))
          "

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'data: weekly pipeline update [skip ci]'
          file_pattern: 'data/*.csv public/data/status.json'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
